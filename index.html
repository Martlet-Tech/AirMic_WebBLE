<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AirMic Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1a1c2c;
      --panel: #222639;
      --border: #3a3f5c;
      --white: #f4f4f4;
      --yellow: #ffcd75;
      --green: #38b764;
      --red: #b13e53;
      --blue: #41a6f6;
      --purple: #7b5ea7;
      --gray: #566c86;
      --font: 'Press Start 2P', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      image-rendering: pixelated;
    }

    body {
      background: var(--bg);
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 8px 8px;
      color: var(--white);
      font-family: var(--font);
      font-size: 8px;
      line-height: 1.6;
      min-height: 100vh;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── 像素边框 mixin ── */
    .pixel-box {
      background: var(--panel);
      /* 8方向像素边框模拟 */
      box-shadow:
        0 -4px 0 0 var(--border),
        0 4px 0 0 var(--border),
        -4px 0 0 0 var(--border),
        4px 0 0 0 var(--border);
      padding: 20px;
      position: relative;
      width: 100%;
      max-width: 480px;
      margin-bottom: 20px;
    }

    /* ── 标题 ── */
    header {
      width: 100%;
      max-width: 480px;
      margin-bottom: 24px;
      text-align: center;
    }

    .title {
      font-size: 18px;
      color: var(--yellow);
      text-shadow:
        4px 4px 0 #8b5e00,
        -2px -2px 0 rgba(0, 0, 0, 0.5);
      letter-spacing: 4px;
      margin-bottom: 8px;
      display: block;
    }

    .subtitle {
      font-size: 6px;
      color: var(--gray);
      letter-spacing: 3px;
    }

    /* ── 连接状态条 ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .pixel-led {
      width: 12px;
      height: 12px;
      background: var(--gray);
      box-shadow: inset -2px -2px 0 rgba(0, 0, 0, 0.4);
      flex-shrink: 0;
    }

    .pixel-led.on {
      background: var(--green);
      box-shadow:
        inset -2px -2px 0 rgba(0, 0, 0, 0.3),
        0 0 8px var(--green),
        0 0 16px rgba(56, 183, 100, 0.4);
      animation: blink 2s steps(1) infinite;
    }

    @keyframes blink {

      0%,
      90%,
      100% {
        opacity: 1;
      }

      95% {
        opacity: 0.4;
      }
    }

    .status-text {
      font-size: 7px;
      color: var(--gray);
    }

    .status-text.on {
      color: var(--green);
    }

    /* ── 按钮 ── */
    .px-btn {
      font-family: var(--font);
      font-size: 7px;
      color: var(--bg);
      background: var(--yellow);
      border: none;
      padding: 10px 16px;
      cursor: pointer;
      box-shadow: 4px 4px 0 #8b5e00;
      letter-spacing: 1px;
      transition: transform 0.05s, box-shadow 0.05s;
      display: block;
      width: 100%;
    }

    .px-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #8b5e00;
    }

    .px-btn:disabled {
      background: var(--border);
      color: var(--gray);
      box-shadow: 4px 4px 0 #111;
      cursor: not-allowed;
    }

    .px-btn.green {
      background: var(--green);
      box-shadow: 4px 4px 0 #1e6b3a;
    }

    .px-btn.green:active {
      box-shadow: 2px 2px 0 #1e6b3a;
    }

    .px-btn.red {
      background: var(--red);
      box-shadow: 4px 4px 0 #6b1e2a;
    }

    .px-btn.red:active {
      box-shadow: 2px 2px 0 #6b1e2a;
    }

    .px-btn.blue {
      background: var(--blue);
      color: var(--bg);
      box-shadow: 4px 4px 0 #1e5a8b;
    }

    .px-btn.blue:active {
      box-shadow: 2px 2px 0 #1e5a8b;
    }

    /* ── 卡片标题 ── */
    .card-label {
      font-size: 6px;
      color: var(--yellow);
      letter-spacing: 2px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-label::before {
      content: '▶';
      color: var(--purple);
    }

    /* ── 时钟 ── */
    .clock {
      font-size: 22px;
      color: var(--green);
      text-shadow: 3px 3px 0 #1e6b3a;
      letter-spacing: 4px;
      margin-bottom: 4px;
    }

    .clock-date {
      font-size: 6px;
      color: var(--gray);
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    /* ── 响应框 ── */
    .resp {
      background: var(--bg);
      border: 2px solid var(--border);
      padding: 10px 12px;
      font-size: 7px;
      color: var(--gray);
      margin-top: 12px;
      min-height: 32px;
      word-break: break-all;
    }

    .resp.ok {
      color: var(--green);
      border-color: var(--green);
    }

    .resp.err {
      color: var(--red);
      border-color: var(--red);
    }

    /* ── Select ── */
    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field label {
      display: block;
      font-size: 6px;
      color: var(--gray);
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .field select {
      font-family: var(--font);
      font-size: 7px;
      background: var(--bg);
      color: var(--white);
      border: 2px solid var(--border);
      padding: 8px;
      width: 100%;
      margin-bottom: 10px;
      outline: none;
      cursor: pointer;
    }

    .field select:focus {
      border-color: var(--yellow);
    }

    /* ── 日志 ── */
    .log {
      background: var(--bg);
      border: 2px solid var(--border);
      padding: 10px;
      height: 160px;
      overflow-y: auto;
      font-size: 6px;
      line-height: 2;
    }

    .log::-webkit-scrollbar {
      width: 6px;
    }

    .log::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    .log-row {
      display: flex;
      gap: 8px;
    }

    .lt {
      color: var(--purple);
      flex-shrink: 0;
    }

    .lm {
      color: var(--white);
    }

    .lm.ok {
      color: var(--green);
    }

    .lm.err {
      color: var(--red);
    }

    .lm.tx {
      color: var(--blue);
    }

    .lm.rx {
      color: var(--yellow);
    }

    /* ── 扫描动画 ── */
    @keyframes scan {
      0% {
        content: 'SCANNING.  ';
      }

      33% {
        content: 'SCANNING.. ';
      }

      66% {
        content: 'SCANNING...';
      }
    }
  </style>
</head>

<body>

  <header>
    <span class="title">AirMic</span>
    <div class="subtitle">FPV AUDIO MODULE // BLE CONTROLLER</div>
  </header>

  <!-- 连接 -->
  <div class="pixel-box">
    <div class="card-label">BLUETOOTH</div>
    <div class="status-bar">
      <div class="pixel-led" id="led"></div>
      <span class="status-text" id="stText">NOT CONNECTED</span>
    </div>
    <button class="px-btn" id="btnConn" onclick="toggleConnect()">
      [ SCAN &amp; CONNECT ]
    </button>
  </div>

  <!-- 时间同步 -->
  <div class="pixel-box">
    <div class="card-label">TIME SYNC CMD:0x01</div>
    <div class="clock" id="clock">--:--:--</div>
    <div class="clock-date" id="cdate">---- -- --</div>
    <button class="px-btn green" id="btnSync" onclick="cmdTimeSync()" disabled>
      [ SYNC TIME → DEVICE ]
    </button>
    <div class="resp" id="respSync">—</div>
  </div>

  <!-- 音频参数 -->
  <div class="pixel-box">
    <div class="card-label">AUDIO CONFIG CMD:0x02/0x03</div>
    <div class="row2">
      <div class="field">
        <label>SAMPLE RATE</label>
        <select id="selRate">
          <option value="8000">8000 HZ</option>
          <option value="16000">16000 HZ</option>
          <option value="48000" selected>48000 HZ</option>
        </select>
        <button class="px-btn blue" onclick="cmdSampleRate()" id="btnRate" disabled>[ SEND
          ]</button>
      </div>
      <div class="field">
        <label>CHANNELS</label>
        <select id="selCh">
          <option value="1">MONO</option>
          <option value="2" selected>STEREO</option>
        </select>
        <button class="px-btn blue" onclick="cmdChannels()" id="btnCh" disabled>[ SEND
          ]</button>
      </div>
    </div>
  </div>

  <!-- 状态查询 -->
  <div class="pixel-box">
    <div class="card-label">DEVICE STATUS CMD:0x04</div>
    <button class="px-btn" id="btnStat" onclick="cmdGetStatus()" disabled>
      [ QUERY STATUS ]
    </button>
    <div class="resp" id="respStat">—</div>
  </div>

  <!-- 日志 -->
  <div class="pixel-box">
    <div class="card-label">LOG</div>
    <div class="log" id="logBox"></div>
  </div>

  <script>
    // ── UUID 配置 ──────────────────────────────────────────────
    const SVC_AIRMIC = '100f0e0d-0c0b-0a09-0807-060504030201'
    const CHAR_CTRL = '120f0e0d-0c0b-0a09-0807-060504030201'
    const CHAR_RESP = '130f0e0d-0c0b-0a09-0807-060504030201'

    let device = null, ctrlChar = null

    // ── 时钟 ──────────────────────────────────────────────────
    setInterval(() => {
      const n = new Date()
      document.getElementById('clock').textContent = n.toTimeString().slice(0, 8)
      document.getElementById('cdate').textContent = n.toISOString().slice(0, 10)
    }, 500)

    // ── 日志 ──────────────────────────────────────────────────
    function log(msg, type = '') {
      const box = document.getElementById('logBox')
      const t = new Date().toTimeString().slice(0, 8)
      box.innerHTML += `<div class="log-row"><span class="lt">${t}</span><span class="lm ${type}">${msg}</span></div>`
      box.scrollTop = box.scrollHeight
    }

    // ── 连接 ──────────────────────────────────────────────────
    async function toggleConnect() {
      if (device?.gatt.connected) { device.gatt.disconnect(); return }

      try {
        log('scanning for AirMic...', 'tx')
        device = await navigator.bluetooth.requestDevice({
          filters: [{ name: 'Martlet AirMic' }],
          optionalServices: [SVC_AIRMIC]
        })
        device.addEventListener('gattserverdisconnected', onDisc)

        const server = await device.gatt.connect()
        log('connected: ' + device.name, 'ok')

        const svc = await server.getPrimaryService(SVC_AIRMIC)
        ctrlChar = await svc.getCharacteristic(CHAR_CTRL)
        const resp = await svc.getCharacteristic(CHAR_RESP)
        await resp.startNotifications()
        resp.addEventListener('characteristicvaluechanged', onNotify)
        log('notifications ready', 'ok')
        setUI(true)
      } catch (e) {
        log('error: ' + e.message, 'err')
        setUI(false)
      }
    }

    function onDisc() {
      log('disconnected', 'err')
      setUI(false)
    }

    function setUI(on) {
      document.getElementById('led').className = 'pixel-led' + (on ? ' on' : '')
      document.getElementById('stText').className = 'status-text' + (on ? ' on' : '')
      document.getElementById('stText').textContent = on ? 'CONNECTED' : 'NOT CONNECTED'
      document.getElementById('btnConn').className = on ? 'px-btn red' : 'px-btn'
      document.getElementById('btnConn').textContent = on ? '[ DISCONNECT ]' : '[ SCAN & CONNECT ]'
        ;['btnSync', 'btnRate', 'btnCh', 'btnStat'].forEach(id => {
          document.getElementById(id).disabled = !on
        })
    }

    // ── 收到 Notify ───────────────────────────────────────────
    function onNotify(e) {
      const d = new Uint8Array(e.target.value.buffer)
      const hex = Array.from(d).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join(' ')
      log('← ' + hex, 'rx')

      const cmd = d[0], ok = d[1] === 0

      if (cmd === 0x01) {
        setResp('respSync', ok ? 'OK - TIME SYNCED' : 'ERROR', ok)
      }
      if (cmd === 0x02) setResp('respSync', ok ? 'OK - RATE SET' : 'ERROR', ok)
      if (cmd === 0x03) setResp('respSync', ok ? 'OK - CH SET' : 'ERROR', ok)
      if (cmd === 0x04 && ok) {
        const ts = d[2] | (d[3] << 8) | (d[4] << 16) | (d[5] << 24)
        setResp('respStat', 'REC=' + d[1] + '  TIME=' + new Date(ts * 1000).toISOString(), true)
      }
    }

    function setResp(id, msg, ok) {
      const el = document.getElementById(id)
      el.textContent = msg
      el.className = 'resp ' + (ok ? 'ok' : 'err')
    }

    // ── 发送 ─────────────────────────────────────────────────
    async function send(buf) {
      if (!ctrlChar) { log('not connected', 'err'); return }
      try {
        const hex = Array.from(new Uint8Array(buf))
          .map(b => b.toString(16).padStart(2, '0').toUpperCase()).join(' ')
        await ctrlChar.writeValueWithoutResponse(buf)
        log('→ ' + hex, 'tx')
      } catch (e) { log('send err: ' + e.message, 'err') }
    }

    async function cmdTimeSync() {
      const ts = BigInt(Date.now())
      const b = new ArrayBuffer(10)
      const v = new DataView(b)
      v.setUint8(0, 0x01); v.setUint8(1, 0x08)
      v.setBigUint64(2, ts, true)
      await send(b)
    }

    async function cmdSampleRate() {
      const r = parseInt(document.getElementById('selRate').value)
      const b = new ArrayBuffer(6), v = new DataView(b)
      v.setUint8(0, 0x02); v.setUint8(1, 0x04); v.setUint32(2, r, true)
      await send(b)
    }

    async function cmdChannels() {
      const c = parseInt(document.getElementById('selCh').value)
      const b = new Uint8Array([0x03, 0x01, c])
      await send(b.buffer)
    }

    async function cmdGetStatus() {
      await send(new Uint8Array([0x04, 0x00]).buffer)
    }
  </script>
</body>

</html>
